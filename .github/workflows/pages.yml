name: Pages

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: ["Tag Release"]
    types:
      - completed

permissions:
  actions: write
  contents: write
  pages: write

jobs:
  resolve-tag:
    name: Resolve tag name
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      is-tag: ${{ steps.resolve.outputs.is-tag }}

    permissions:
      actions: read

    steps:
    - name: Resolve tag from push event (tag)
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      id: from-push-tag
      env:
        REF_NAME: ${{ github.ref_name }}
      run: |
        echo "tag=$REF_NAME" >> $GITHUB_OUTPUT
        echo "is-tag=true" >> $GITHUB_OUTPUT

    - name: Resolve from push event (branch)
      if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
      id: from-push-branch
      run: echo "is-tag=false" >> $GITHUB_OUTPUT

    - name: Download tag artifact from Tag Release
      if: github.event_name == 'workflow_run'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: tag-name
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}

    - name: Resolve tag from artifact
      if: github.event_name == 'workflow_run'
      id: from-artifact
      run: |
        echo "tag=$(cat tag-name.txt)" >> $GITHUB_OUTPUT
        echo "is-tag=true" >> $GITHUB_OUTPUT

    - name: Sanitize and set output
      id: resolve
      env:
        TAG_PUSH: ${{ steps.from-push-tag.outputs.tag }}
        TAG_ARTIFACT: ${{ steps.from-artifact.outputs.tag }}
        IS_TAG_PUSH: ${{ steps.from-push-tag.outputs.is-tag }}
        IS_TAG_ARTIFACT: ${{ steps.from-artifact.outputs.is-tag }}
        IS_TAG_BRANCH: ${{ steps.from-push-branch.outputs.is-tag }}
      run: |
        TAG="${TAG_PUSH:-$TAG_ARTIFACT}"
        IS_TAG="${IS_TAG_PUSH:-${IS_TAG_ARTIFACT:-$IS_TAG_BRANCH}}"
        if [[ "$IS_TAG" == "true" ]] && [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid tag format: '$TAG'. Expected vX.Y.Z"
          exit 1
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "is-tag=$IS_TAG" >> $GITHUB_OUTPUT

  deploy:
    needs: resolve-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.resolve-tag.outputs.is-tag == 'true' && needs.resolve-tag.outputs.tag || 'main' }}
          fetch-depth: 0  # Fetch all history for mike to work properly
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - name: Install dependencies
        run: pip install mike mkdocs-material mkdocstrings[python]
      - name: Deploy documentation
        env:
          IS_TAG: ${{ needs.resolve-tag.outputs.is-tag }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          if [[ "$IS_TAG" == "true" ]]; then
            # Deploy versioned docs for tags
            VERSION="${TAG#v}"  # Remove 'v' prefix
            mike deploy --push --update-aliases $VERSION latest
            mike set-default --push latest
          else
            # Deploy dev docs for main branch
            mike deploy --push dev
          fi
