name: Docker 🐳

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: ["Tag Release"]
    types:
      - completed

permissions:
  contents: read

jobs:
  resolve-tag:
    name: Resolve tag name
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}

    permissions:
      actions: read

    steps:
    - name: Resolve tag from push event
      if: github.event_name == 'push'
      id: from-push
      env:
        REF_NAME: ${{ github.ref_name }}
      run: echo "tag=$REF_NAME" >> $GITHUB_OUTPUT

    - name: Download tag artifact from Tag Release
      if: github.event_name == 'workflow_run'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: tag-name
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}

    - name: Resolve tag from artifact
      if: github.event_name == 'workflow_run'
      id: from-artifact
      run: echo "tag=$(cat tag-name.txt)" >> $GITHUB_OUTPUT

    - name: Sanitize and set output
      id: resolve
      env:
        TAG_PUSH: ${{ steps.from-push.outputs.tag }}
        TAG_ARTIFACT: ${{ steps.from-artifact.outputs.tag }}
      run: |
        TAG="${TAG_PUSH:-$TAG_ARTIFACT}"
        if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid tag format: '$TAG'. Expected vX.Y.Z"
          exit 1
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT

  docker:
    needs: resolve-tag
    runs-on: ubuntu-latest
    steps:
    # - name: Set up Docker Buildx
    #   uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        push: true
        tags: |
          sereto/sereto:latest
          sereto/sereto:${{ needs.resolve-tag.outputs.tag }}
