name: Publish Python 🐍 distribution 📦 to PyPI and GitHub releases

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: ["Tag Release"]
    types:
      - completed

permissions:
  contents: read

env:
  BUILD_FRONTEND_VERSION: "1.4.3"
  BUILD_PYTHON_VERSION: "3.12.13"

jobs:
  resolve-tag:
    name: Resolve tag name
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}

    permissions:
      actions: read

    steps:
    - name: Resolve tag from push event
      if: github.event_name == 'push'
      id: from-push
      env:
        REF_NAME: ${{ github.ref_name }}
      run: echo "tag=$REF_NAME" >> $GITHUB_OUTPUT

    - name: Download tag artifact from Tag Release
      if: github.event_name == 'workflow_run'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: tag-name
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}

    - name: Resolve tag from artifact
      if: github.event_name == 'workflow_run'
      id: from-artifact
      run: echo "tag=$(cat tag-name.txt)" >> $GITHUB_OUTPUT

    - name: Sanitize and set output
      id: resolve
      env:
        TAG_PUSH: ${{ steps.from-push.outputs.tag }}
        TAG_ARTIFACT: ${{ steps.from-artifact.outputs.tag }}
      run: |
        TAG="${TAG_PUSH:-$TAG_ARTIFACT}"
        if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid tag format: '$TAG'. Expected vX.Y.Z"
          exit 1
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT

  build:
    name: Build distribution 📦
    needs: resolve-tag
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write   # upload-artifact

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        ref: ${{ needs.resolve-tag.outputs.tag }}
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ env.BUILD_PYTHON_VERSION }}
    - name: Set reproducible build timestamp
      env:
        TAG: ${{ needs.resolve-tag.outputs.tag }}
      run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct "$TAG")" >> $GITHUB_ENV
    - name: Install pypa/build
      run: python3 -m pip install "build==${BUILD_FRONTEND_VERSION}" --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: python-package-distributions
        path: dist/

  verify-reproducibility:
    name: Verify reproducible distributions
    needs:
    - resolve-tag
    - build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        ref: ${{ needs.resolve-tag.outputs.tag }}
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ env.BUILD_PYTHON_VERSION }}
    - name: Download reference distributions
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: python-package-distributions
        path: ${{ runner.temp }}/reference-dist
    - name: Set reproducible build timestamp
      env:
        TAG: ${{ needs.resolve-tag.outputs.tag }}
      run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct "$TAG")" >> $GITHUB_ENV
    - name: Install pypa/build
      run: python3 -m pip install "build==${BUILD_FRONTEND_VERSION}" --user
    - name: Rebuild distributions
      run: python3 -m build --outdir "${{ runner.temp }}/rebuilt-dist"
    - name: Compare distribution hashes
      run: |
        shopt -s nullglob
        reference_artifacts=("${{ runner.temp }}"/reference-dist/*)
        rebuilt_artifacts=("${{ runner.temp }}"/rebuilt-dist/*)

        if [ "${#reference_artifacts[@]}" -eq 0 ] || [ "${#rebuilt_artifacts[@]}" -eq 0 ]; then
          echo "::error::Missing artifacts for reproducibility verification."
          exit 1
        fi

        if [ "${#reference_artifacts[@]}" -ne "${#rebuilt_artifacts[@]}" ]; then
          echo "::error::Artifact count mismatch between reference and rebuilt distributions."
          exit 1
        fi

        for artifact in "${reference_artifacts[@]}"; do
          filename=$(basename "$artifact")
          rebuilt_artifact="${{ runner.temp }}/rebuilt-dist/$filename"

          if [ ! -f "$rebuilt_artifact" ]; then
            echo "::error::Missing rebuilt artifact: $filename"
            exit 1
          fi

          reference_hash=$(sha256sum "$artifact" | cut -d' ' -f1)
          rebuilt_hash=$(sha256sum "$rebuilt_artifact" | cut -d' ' -f1)

          if [ "$reference_hash" != "$rebuilt_hash" ]; then
            echo "::error::Artifact is not reproducible: $filename"
            echo "reference: $reference_hash"
            echo "rebuilt:   $rebuilt_hash"
            exit 1
          fi
        done

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    needs:
    - build
    - verify-reproducibility
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sereto

    permissions:
      id-token: write   # OIDC for pypa/gh-action-pypi-publish
      actions: read     # download-artifact

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    needs:
    - resolve-tag
    - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub Release
      id-token: write   # sigstore
      actions: read     # download-artifact

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        ref: ${{ needs.resolve-tag.outputs.tag }}
    - name: Download all the dists
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: python-package-distributions
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46 # v3.0.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Prepare numeric version
      env:
        TAG: ${{ needs.resolve-tag.outputs.tag }}
      run: |
        NUMERIC_VERSION="${TAG#v}" # Remove leading 'v'
        echo "NUMERIC_VERSION=${NUMERIC_VERSION}" >> $GITHUB_ENV # Set it as an environment variable for later steps
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
        TAG: ${{ needs.resolve-tag.outputs.tag }}
      run: |
        CHANGELOG=$(sed -n "/^## \[$NUMERIC_VERSION\]/,/^## /p" CHANGELOG.md | sed '1d;$d;')
        gh release create "$TAG" \
        dist/** \
        --repo '${{ github.repository }}' \
        --verify-tag \
        --title "$TAG" \
        --notes "$CHANGELOG"
