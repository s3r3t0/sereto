name: Publish Python 🐍 distribution 📦 to PyPI and GitHub releases

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: ["Tag Release"]
    types:
      - completed

jobs:
  resolve-tag:
    name: Resolve tag name
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}

    permissions:
      actions: read

    steps:
    - name: Resolve tag from push event
      if: github.event_name == 'push'
      id: from-push
      env:
        REF_NAME: ${{ github.ref_name }}
      run: echo "tag=$REF_NAME" >> $GITHUB_OUTPUT

    - name: Download tag artifact from Tag Release
      if: github.event_name == 'workflow_run'
      uses: actions/download-artifact@v4
      with:
        name: tag-name
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}

    - name: Resolve tag from artifact
      if: github.event_name == 'workflow_run'
      id: from-artifact
      run: echo "tag=$(cat tag-name.txt)" >> $GITHUB_OUTPUT

    - name: Sanitize and set output
      id: resolve
      env:
        TAG_PUSH: ${{ steps.from-push.outputs.tag }}
        TAG_ARTIFACT: ${{ steps.from-artifact.outputs.tag }}
      run: |
        TAG="${TAG_PUSH:-$TAG_ARTIFACT}"
        if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid tag format: '$TAG'. Expected vX.Y.Z"
          exit 1
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT

  build:
    name: Build distribution 📦
    needs: resolve-tag
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write   # upload-artifact

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.resolve-tag.outputs.tag }}
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: python3 -m pip install build --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sereto

    permissions:
      id-token: write   # OIDC for pypa/gh-action-pypi-publish
      actions: read     # download-artifact

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: >-
      Sign the Python 🐍 distribution 📦 with Sigstore
      and upload them to GitHub Release
    needs:
    - resolve-tag
    - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub Release
      id-token: write   # sigstore
      actions: read     # download-artifact

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.resolve-tag.outputs.tag }}
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.0.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Prepare numeric version
      env:
        TAG: ${{ needs.resolve-tag.outputs.tag }}
      run: |
        NUMERIC_VERSION="${TAG#v}" # Remove leading 'v'
        echo "NUMERIC_VERSION=${NUMERIC_VERSION}" >> $GITHUB_ENV # Set it as an environment variable for later steps
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
        TAG: ${{ needs.resolve-tag.outputs.tag }}
      run: |
        CHANGELOG=$(sed -n "/^## \[$NUMERIC_VERSION\]/,/^## /p" CHANGELOG.md | sed '1d;$d;')
        gh release create "$TAG" \
        --repo '${{ github.repository }}' \
        --title "$TAG" \
        --notes "$CHANGELOG"
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
        TAG: ${{ needs.resolve-tag.outputs.tag }}
      # Upload to GitHub Release using the `gh` CLI.
      # `dist/` contains the built packages, and the
      # sigstore-produced signatures and certificates.
      run: >-
        gh release upload
        "$TAG" dist/**
        --repo '${{ github.repository }}'
